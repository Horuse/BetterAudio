name: Bug report
description: Report something that's broken or misbehaving.
title: '[bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Search existing issues first to avoid duplicates.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Splitwave
        2. Add a Microphone node
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected ...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0 (visible in the app menu)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. macOS 15.5 (arm64)
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, logs, related issues, audio devices involved.
