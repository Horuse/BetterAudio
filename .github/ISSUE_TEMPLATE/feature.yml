name: Feature request
description: Suggest a new feature or improvement.
title: '[feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or limitation you're hitting.
      placeholder: I'm trying to ... and currently ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, other tools, or existing features that almost work.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples from other apps, related issues.
